<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ book_title }} - 阅读</title>
  <style>
    :root {
      --bg: #101820;
      --panel: #16212a;
      --text: #C5A059;
      --muted: #9ca3af;
      --border: #2b3a44;
      --primary: #009B77;
      --link: #8ecae6;
      --content-text: #f3f4f6;
      --menu-bg: #111827;
      --menu-text: #ffffff;
      --menu-subtext: #cbd5e1;
      --secondary-btn: #374151;
      --fab-text: #ffffff;
      --fab-border: #1e3a8a;
      --fab-bg: #2563eb;
      --token-border: #94a3b880;
      --token-hover: #93c5fd;
      --overlay-bg: #020617b3;
      --toast-success-bg: #16a34a;
      --toast-warning-bg: #f59e0b;
      --toast-warning-text: #111827;
    }
    body.theme-gatsby {
      --bg: #101820;
      --panel: #16212a;
      --text: #C5A059;
      --muted: #9ca3af;
      --border: #2b3a44;
      --primary: #009B77;
    }
    body.theme-macondo {
      --bg: #F0E6D2;
      --panel: #eadfc8;
      --text: #2B2B2B;
      --muted: #6b6256;
      --border: #d4c8ae;
      --primary: #F2C94C;
      --link: #7c5c2a;
      --content-text: #2b2b2b;
      --menu-bg: #efe3cb;
      --menu-text: #2b2b2b;
      --menu-subtext: #4b4236;
      --secondary-btn: #d8c7a8;
      --fab-text: #2b2b2b;
      --fab-border: #aa9452;
      --fab-bg: #d0b46b;
      --token-border: #7c5c2a66;
      --token-hover: #7c5c2a;
      --overlay-bg: #2b2b2b66;
      --toast-success-bg: #7a9854;
      --toast-warning-bg: #e0b954;
      --toast-warning-text: #2b2b2b;
    }
    body.theme-1984 {
      --bg: #2C2C2C;
      --panel: #363636;
      --text: #E0E0E0;
      --muted: #b3b3b3;
      --border: #4a4a4a;
      --primary: #FF3333;
      --link: #ff7b7b;
      --content-text: #e0e0e0;
      --menu-bg: #303030;
      --menu-text: #f2f2f2;
      --menu-subtext: #d3d3d3;
      --secondary-btn: #4a4a4a;
      --fab-text: #ffffff;
      --fab-border: #7a2f2f;
      --fab-bg: #9a3434;
      --token-border: #bbbbbb66;
      --token-hover: #ff8a8a;
      --overlay-bg: #111111b3;
      --toast-success-bg: #4d9c4d;
      --toast-warning-bg: #c77a2f;
      --toast-warning-text: #f4f4f4;
    }
    body.theme-pride {
      --bg: #FDFBF7;
      --panel: #f7f3ec;
      --text: #1A4D2E;
      --muted: #5f6f65;
      --border: #ddcfc0;
      --primary: #E29587;
      --link: #1a4d2e;
      --content-text: #1a4d2e;
      --menu-bg: #f4ece1;
      --menu-text: #1a4d2e;
      --menu-subtext: #456252;
      --secondary-btn: #decfc0;
      --fab-text: #1a4d2e;
      --fab-border: #bf8f86;
      --fab-bg: #d69a8f;
      --token-border: #7a8f7f66;
      --token-hover: #1a4d2e;
      --overlay-bg: #5f6f6555;
      --toast-success-bg: #4e8f6a;
      --toast-warning-bg: #d3a05f;
      --toast-warning-text: #1a4d2e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
      line-height: 1.9;
      padding: 24px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .book-meta {
      position: relative;
    }
    .book-content-wrap {
      position: relative;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .back-btn {
      display: inline-block;
      border: 1px solid var(--border);
      background: var(--primary);
      color: var(--fab-text);
      border-radius: 10px;
      padding: 8px 12px;
      text-decoration: none;
      font-size: 14px;
    }
    .nav-links {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 14px;
    }
    .nav-links a {
      color: var(--link);
      text-decoration: none;
    }
    .title {
      margin: 0;
      font-size: 22px;
    }
    .content {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 19px;
      line-height: 1.8;
      color: var(--content-text);
    }
    .reader-container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
      font-size: 19px;
      line-height: 1.8;
    }
    /* 阅读器不展示插图，避免残留破图影响阅读 */
    img {
      display: none !important;
    }
    .word-token {
      cursor: pointer;
      border-bottom: 1px dashed var(--token-border);
      transition: 0.15s;
    }
    .word-token:hover {
      color: var(--token-hover);
      border-bottom-color: var(--token-hover);
    }
    #selection-menu {
      position: fixed;
      z-index: 9999;
      background: var(--menu-bg);
      color: var(--menu-text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      display: none;
      width: min(320px, calc(100vw - 20px));
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      line-height: 1.5;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .menu-word {
      font-weight: 600;
      margin-bottom: 6px;
      word-break: break-word;
    }
    .menu-meaning {
      color: var(--menu-subtext);
      margin-bottom: 8px;
      font-size: 15px;
      line-height: 1.6;
    }
    .menu-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .menu-actions button {
      border: 1px solid var(--border);
      background: var(--primary);
      color: var(--fab-text);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
    }
    .menu-actions .secondary {
      background: var(--secondary-btn);
    }
    #analyzeModal {
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      display: none;
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .modal-card {
      width: min(760px, 100%);
      max-height: 75vh;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    .modal-title {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--text);
    }
    .modal-content {
      color: var(--menu-subtext);
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .fab-vocab {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      border: 1px solid var(--fab-border);
      background: var(--fab-bg);
      color: var(--fab-text);
      font-size: 24px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
      z-index: 10001;
    }
    #feedbackToast {
      position: fixed;
      right: 18px;
      bottom: 84px;
      z-index: 10002;
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      display: none;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
    }
    .toast-success { background: var(--toast-success-bg); }
    .toast-warning { background: var(--toast-warning-bg); color: var(--toast-warning-text); }
    @media (max-width: 400px) {
      .reader-container {
        font-size: 17px;
        line-height: 1.8;
        padding: 0 16px;
      }
    }
  </style>
</head>
<body class="theme-gatsby">
  <div class="container">
    <div class="topbar">
      <div class="nav-links">
        <a class="back-btn" href="/">返回首页</a>
      </div>
      <div class="hint">划词后可朗读并加入生词本</div>
    </div>
    <div class="book-meta">
      <h1 class="title">{{ book_title }}</h1>
    </div>
    <div class="book-content-wrap">
      <article id="book-content" class="content">
        <div class="reader-container">
          <div id="content">
        {% if is_html %}
          {{ content_html|safe }}
        {% else %}
          {{ content_text }}
        {% endif %}
          </div>
        </div>
      </article>
    </div>
  </div>
  <div id="selection-menu">
    <div id="menuWord" class="menu-word"></div>
    <div id="menuMeaning" class="menu-meaning">查询中...</div>
    <div class="menu-actions">
      <button id="speakBtn">朗读</button>
      <button id="addVocabBtn">加入生词本</button>
      <button id="analyzeBtn">语法分析</button>
      <button id="closeMenuBtn" class="secondary">关闭</button>
    </div>
  </div>
  <div id="analyzeModal">
    <div class="modal-card">
      <h3 class="modal-title">AI 语法分析</h3>
      <div id="analyzeContent" class="modal-content">AI 思考中...</div>
      <div style="margin-top:10px;">
        <button id="closeAnalyzeBtn" class="secondary" style="border:1px solid var(--border);background:var(--secondary-btn);color:var(--fab-text);border-radius:8px;padding:6px 10px;cursor:pointer;">关闭</button>
      </div>
    </div>
  </div>
  <a class="fab-vocab" href="/vocab" title="打开单词本" aria-label="打开单词本">📖</a>
  <div id="feedbackToast"></div>
  <script>
    function setupSelectionStudyMenu() {
      const menu = document.getElementById("selection-menu");
      const menuWord = document.getElementById("menuWord");
      const menuMeaning = document.getElementById("menuMeaning");
      const speakBtn = document.getElementById("speakBtn");
      const addVocabBtn = document.getElementById("addVocabBtn");
      const analyzeBtn = document.getElementById("analyzeBtn");
      const closeMenuBtn = document.getElementById("closeMenuBtn");
      const analyzeModal = document.getElementById("analyzeModal");
      const analyzeContent = document.getElementById("analyzeContent");
      const closeAnalyzeBtn = document.getElementById("closeAnalyzeBtn");
      const bookContent = document.getElementById("book-content");
      const contentBox = document.getElementById("content");
      const localBookId = "{{ local_book_id|default('') }}";
      const currentBookId = "{{ current_book_id|default('') }}";
      const feedbackToast = document.getElementById("feedbackToast");
      let selectedText = "";
      let currentMeaning = "";
      const knownWords = new Set();
      const validWordRegex = /^[A-Za-z]{2,32}$/;
      const sentenceRegex = /[A-Za-z]{2,}.*\s+[A-Za-z]{2,}/;
      analyzeBtn.style.display = "none";

      function showFeedback(msg, kind) {
        feedbackToast.className = kind === "warning" ? "toast-warning" : "toast-success";
        feedbackToast.textContent = msg;
        feedbackToast.style.display = "block";
        setTimeout(() => {
          feedbackToast.style.display = "none";
        }, 1800);
      }

      function setAddButtonState(added) {
        if (added) {
          addVocabBtn.textContent = "已加入";
          addVocabBtn.disabled = true;
          addVocabBtn.style.background = "var(--secondary-btn)";
        } else {
          addVocabBtn.textContent = "➕ 加入单词本";
          addVocabBtn.disabled = false;
          addVocabBtn.style.background = "var(--primary)";
        }
      }

      function hideMenu() {
        menu.style.display = "none";
      }

      async function checkWordAdded(word) {
        const key = String(word || "").trim().toLowerCase();
        if (!key || !validWordRegex.test(key)) {
          setAddButtonState(false);
          return;
        }
        if (knownWords.has(key)) {
          setAddButtonState(true);
          return;
        }
        try {
          const res = await fetch(`/api/vocabulary/check?word=${encodeURIComponent(key)}`);
          const data = await res.json();
          if (data.exists) {
            knownWords.add(key);
            setAddButtonState(true);
            return;
          }
        } catch (err) {
          // 忽略检查失败，保持可点击
        }
        setAddButtonState(false);
      }

      async function queryDefinition(text) {
        const word = String(text || "").trim().toLowerCase();
        if (!word || !validWordRegex.test(word)) {
          currentMeaning = "未找到释义";
          menuMeaning.textContent = currentMeaning;
          setAddButtonState(false);
          return;
        }
        await checkWordAdded(word);
        try {
          const res = await fetch("/api/ai-translate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ word })
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            currentMeaning = err.error || "无法联网查询，请检查网络设置";
            menuMeaning.textContent = currentMeaning;
            return;
          }
          const data = await res.json();
          const meaningCn = data.meaning_cn || "";
          const meaningEn = data.meaning_en || "";
          const example = data.example || "";
          if (!meaningCn && !meaningEn) {
            currentMeaning = "未找到释义";
            menuMeaning.textContent = currentMeaning;
            return;
          }
          currentMeaning = `${meaningCn}\n\n${meaningEn}${example ? `\n\n例句: ${example}` : ""}`.trim();
          menuMeaning.textContent = currentMeaning;
        } catch (err) {
          currentMeaning = "无法联网查询，请检查网络设置";
          menuMeaning.textContent = currentMeaning;
        }
      }

      async function analyzeSentence(text) {
        analyzeContent.textContent = "AI 思考中...";
        analyzeModal.style.display = "flex";
        try {
          const res = await fetch("/api/ai-analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sentence: text })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "分析失败");
          analyzeContent.textContent = data.analysis || "未返回分析结果";
        } catch (err) {
          analyzeContent.textContent = err.message || "分析失败";
        }
      }

      function showMenu(text) {
        selectedText = text;
        menuWord.textContent = text;
        currentMeaning = "";
        menuMeaning.textContent = "查询中...";
        setAddButtonState(false);
        menu.style.display = "block";
        queryDefinition(text);
      }

      function positionMenuByRect(rect) {
        if (!rect) return;
        const left = Math.max(10, Math.min(rect.left, window.innerWidth - 330));
        const top = rect.bottom + 10;
        menu.style.left = `${left}px`;
        menu.style.top = `${top}px`;
      }

      speakBtn.addEventListener("click", () => {
        if (!selectedText) return;
        const utter = new SpeechSynthesisUtterance(selectedText);
        utter.lang = "en-US";
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utter);
      });

      addVocabBtn.addEventListener("click", async () => {
        if (!selectedText) return;
        const word = String(selectedText || "").trim().toLowerCase();
        if (!word) return;
        addVocabBtn.disabled = true;
        try {
          const res = await fetch("/api/add_to_vocabulary", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              word,
              definition: currentMeaning || "未找到释义",
              book_id: currentBookId || localBookId || ""
            })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "加入失败");
          if (data.status === "duplicate") {
            knownWords.add(word);
            setAddButtonState(true);
            showFeedback("该单词已在单词本中，无需重复添加 ⚠️", "warning");
          } else if (data.status === "success") {
            knownWords.add(word);
            setAddButtonState(true);
            showFeedback("已加入单词本 ✅", "success");
          } else {
            throw new Error("加入失败");
          }
        } catch (err) {
          showFeedback(err.message || "加入失败", "warning");
          setAddButtonState(false);
        } finally {
          if (addVocabBtn.textContent !== "已加入") {
            addVocabBtn.disabled = false;
          }
        }
      });

      closeMenuBtn.addEventListener("click", hideMenu);
      closeAnalyzeBtn.addEventListener("click", () => { analyzeModal.style.display = "none"; });
      analyzeModal.addEventListener("click", (e) => {
        if (e.target === analyzeModal) analyzeModal.style.display = "none";
      });

      analyzeBtn.addEventListener("click", async () => {
        if (!selectedText) return;
        await analyzeSentence(selectedText);
      });

      function wrapEnglishWords(container) {
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
        const textNodes = [];
        while (walker.nextNode()) {
          const node = walker.currentNode;
          if (node.parentNode && node.parentNode.nodeName !== "SCRIPT" && node.nodeValue && /[A-Za-z]{2,}/.test(node.nodeValue)) {
            textNodes.push(node);
          }
        }

        textNodes.forEach((node) => {
          const text = node.nodeValue;
          const frag = document.createDocumentFragment();
          const regex = /([A-Za-z]{2,}(?:['-][A-Za-z]{2,})?)/g;
          let last = 0;
          let match;
          while ((match = regex.exec(text)) !== null) {
            const start = match.index;
            if (start > last) {
              frag.appendChild(document.createTextNode(text.slice(last, start)));
            }
            const span = document.createElement("span");
            span.className = "word-token";
            span.textContent = match[0];
            frag.appendChild(span);
            last = regex.lastIndex;
          }
          if (last < text.length) {
            frag.appendChild(document.createTextNode(text.slice(last)));
          }
          node.parentNode.replaceChild(frag, node);
        });
      }

      function escapeHtml(str) {
        return String(str || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderParagraphs(text) {
        const content = String(text || "").trim();
        if (!content) {
          contentBox.innerHTML = "<p>未找到正文内容。</p>";
          return;
        }
        const paragraphs = content.split(/\n{2,}/).map((p) => p.trim()).filter(Boolean);
        contentBox.innerHTML = paragraphs.map((p) => `<p>${escapeHtml(p)}</p>`).join("");
      }

      async function loadLocalBookContent() {
        if (!localBookId) return;
        contentBox.innerHTML = "<p>正在加载正文...</p>";
        try {
          const res = await fetch(`/api/book/${encodeURIComponent(localBookId)}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "加载失败");
          renderParagraphs(data.content || "");
        } catch (err) {
          contentBox.innerHTML = "<p>正文加载失败。</p>";
        }
      }

      const init = async () => {
        if (localBookId) {
          await loadLocalBookContent();
        }
        wrapEnglishWords(contentBox);
      };

      init();

      // 事件委托：统一监听正文容器点击
      bookContent.addEventListener("click", (e) => {
        const target = e.target;
        if (!target || target.tagName !== "SPAN" || !target.classList.contains("word-token")) {
          return;
        }
        const text = (target.textContent || "").trim();
        if (!text || !validWordRegex.test(text)) {
          menuWord.textContent = text;
          currentMeaning = "请选择英文单词";
          menuMeaning.textContent = currentMeaning;
          menu.style.display = "block";
          const rect = target.getBoundingClientRect();
          positionMenuByRect(rect);
          return;
        }
        analyzeBtn.style.display = "none";
        showMenu(text);
        const rect = target.getBoundingClientRect();
        positionMenuByRect(rect);
      });

      // 选中整句时显示“语法分析”按钮
      document.addEventListener("mouseup", (e) => {
        const text = (window.getSelection()?.toString() || "").trim();
        if (!text || !bookContent.contains(e.target)) return;
        if (sentenceRegex.test(text) && text.split(/\s+/).length >= 3) {
          showMenu(text);
          analyzeBtn.style.display = "inline-block";
          const sel = window.getSelection();
          if (sel && sel.rangeCount > 0) {
            positionMenuByRect(sel.getRangeAt(0).getBoundingClientRect());
          }
        }
      });

      document.addEventListener("mousedown", (e) => {
        if (!menu.contains(e.target) && !bookContent.contains(e.target)) {
          setTimeout(() => {
            hideMenu();
          }, 0);
        }
      });
    }

    (function applySavedTheme() {
      const key = "rl-theme";
      const saved = localStorage.getItem(key) || "theme-gatsby";
      document.body.classList.remove("theme-gatsby", "theme-macondo", "theme-1984", "theme-pride");
      document.body.classList.add(saved);
    })();

    setupSelectionStudyMenu();
  </script>
</body>
</html>
